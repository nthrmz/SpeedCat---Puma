<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Retro Nokia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="phone-frame" aria-label="Videojuego Snake estilo Nokia">
      <div class="speaker"></div>

      <header class="game-header">
        <div>
          <p class="brand mb-0">NOKIA SNAKE</p>
          <h1>Snake Retro</h1>
        </div>
        <div class="status-light" aria-hidden="true"></div>
      </header>

      <section class="lcd-screen">
        <div class="screen-topbar">
          <span>Puntaje: <strong id="score">0</strong></span>
          <span>Mejor: <strong id="bestScore">0</strong></span>
        </div>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="420" height="420" aria-label="Tablero de Snake"></canvas>
          <div id="message" class="game-message">
            <span>Presiona iniciar</span>
          </div>
        </div>
      </section>

      <section class="controls-panel">
        <div class="actions d-flex gap-2">
          <button id="startBtn" class="btn btn-success flex-fill" type="button">Iniciar</button>
          <button id="pauseBtn" class="btn btn-outline-light flex-fill" type="button">Pausa</button>
        </div>

        <div class="d-pad" aria-label="Controles direccionales">
          <button class="pad-btn up" type="button" data-direction="up" aria-label="Mover arriba">&uarr;</button>
          <button class="pad-btn left" type="button" data-direction="left" aria-label="Mover izquierda">&larr;</button>
          <button class="pad-btn center" type="button" aria-label="Boton decorativo">&bull;</button>
          <button class="pad-btn right" type="button" data-direction="right" aria-label="Mover derecha">&rarr;</button>
          <button class="pad-btn down" type="button" data-direction="down" aria-label="Mover abajo">&darr;</button>
        </div>

        <p class="hint mb-0">Usa las flechas, WASD o los botones del cursor.</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
